site:
  name: The Chocolate Future
  site: 'https://chocolatefund.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: The Chocolate Future
    template: '%s — The Chocolate Future'
  description: 'The Chocolate Future connects diaspora capital to Ghana\'s cocoa-processing industry, creating jobs and strengthening local value chains.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: The Chocolate Future
    images:
      - url: '../hero.jpg'
        width: 1200
        height: 628
    type: website
# Twitter disabled (template artifact removed)

i18n:
  language: en
  textDirection: ltr

# Apps - Chocolate Fund site structure (no blog template docs)
apps: {}

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
